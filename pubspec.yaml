name: hacklens
description: HackLens mobile client — companion to sonar-hack-app (Next.js). Browse hackathons against the same /api/hackathons BFF.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  provider: ^6.1.0
  google_fonts: ^6.2.0
  cached_network_image: ^3.3.0
  intl: ^0.19.0
  url_launcher: ^6.2.0
  shared_preferences: ^2.2.0
  google_sign_in: ^6.2.2
  flutter_secure_storage: ^9.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
